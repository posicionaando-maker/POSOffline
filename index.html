<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlace POS Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-20">
    <nav class="bg-indigo-700 p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic">Enlace POS</h1>
            <button onclick="importarDesdeGoogle()" class="bg-indigo-600 px-3 py-1 rounded text-sm hover:bg-indigo-500">
                <i class="fas fa-sync"></i>
            </button>
        </div>
    </nav>

    <div class="container mx-auto px-4 mt-6">
        <div id="lista-productos" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-2xl flex justify-between items-center">
        <div>
            <p class="text-xs text-gray-500 uppercase">Total a cobrar</p>
            <p class="text-2xl font-black text-indigo-700">$<span id="total-display">0.00</span></p>
        </div>
        <div class="flex gap-2">
            <button onclick="reiniciar()" class="bg-gray-200 p-4 rounded-lg text-gray-600"><i class="fas fa-trash"></i></button>
            <button onclick="cobrar()" class="bg-green-600 text-white px-8 py-4 rounded-lg font-bold shadow-lg">COBRAR</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Registro del Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
